services:
  # PostgreSQL Database
  - type: pserv
    name: bwai-db
    plan: free
    databaseEngine: PostgreSQL
    databaseVersion: "16"
    ipAllowList: []

  # FastAPI Backend
  - type: web_service
    name: bwai-api
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bwai-db
          property: connectionString
      - key: AI_API_URL
        value: https://proxy.vibecode.tours/v1/chat/completions
      - key: AI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12"
